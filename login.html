<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Вход</title>
  <link href="assets/tailwind.min.css" rel="stylesheet" />
  <link href="assets/styles.css" rel="stylesheet" />
</head>
<body class="bg-gray-100 text-gray-900 font-sans">
<header class="bg-white shadow p-4 flex justify-between items-center">
  <h1 class="text-xl font-bold text-blue-600">СППР</h1>
  <nav class="space-x-4">
    <a href="index.html" class="text-blue-700 hover:underline">Главная</a>
    <a href="register.html" class="text-blue-700 hover:underline">Регистрация</a>
  </nav>
</header>

<main class="max-w-6xl mx-auto px-8 py-10">
  <h2 class="text-3xl font-bold mb-6">Вход в систему</h2>
  <form action="login_user.php" method="POST" class="space-y-6">
    <div>
      <label for="username" class="block font-medium text-lg">Логин</label>
      <input type="text" id="username" name="username" required class="w-full p-3 mt-2 border rounded-md">
    </div>
    <div>
      <label for="password" class="block font-medium text-lg">Пароль</label>
      <input type="password" id="password" name="password" required class="w-full p-3 mt-2 border rounded-md">
    </div>
    <button type="submit" class="w-full py-3 bg-blue-600 text-white rounded-md hover:bg-blue-700">Войти</button>
  </form>
</main>
</body>
</html>
