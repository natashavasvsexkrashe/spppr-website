<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Создание новой проблемы</title>
  <link href="assets/tailwind.min.css" rel="stylesheet" />
  <link href="assets/styles.css" rel="stylesheet" />
</head>
<body class="bg-gray-100 text-gray-900 font-sans">
<header class="bg-white shadow p-4 flex justify-between items-center">
  <h1 class="text-xl font-bold text-blue-600">СППР</h1>
  <nav class="space-x-4">
    <a href="index.html" class="text-blue-700 hover:underline">Главная</a>
    <a href="problems.html" class="text-blue-700 hover:underline">Проблемные ситуации</a>
    <a href="login.html" class="bg-blue-600 text-white px-3 py-1 rounded hover:bg-blue-700">Вход</a>
  </nav>
</header>

<main class="max-w-6xl mx-auto px-8 py-10">
  <h2 class="text-3xl font-bold mb-6">Создание новой проблемной ситуации</h2>
  <form action="insert_problem.php" method="POST" class="space-y-6">
    <div>
      <label for="title" class="block font-medium text-lg">Название проблемы</label>
      <input type="text" id="title" name="title" required class="w-full p-3 mt-2 border rounded-md">
    </div>
    <div>
      <label for="keywords" class="block font-medium text-lg">Ключевые слова</label>
      <input type="text" id="keywords" name="keywords" required class="w-full p-3 mt-2 border rounded-md">
    </div>
    <div>
      <label for="description" class="block font-medium text-lg">Описание ситуации</label>
      <textarea id="description" name="description" rows="4" required class="w-full p-3 mt-2 border rounded-md"></textarea>
    </div>
    <div>
      <label for="category" class="block font-medium text-lg">Категория</label>
      <select id="category" name="category" required class="w-full p-3 mt-2 border rounded-md">
        <option value="финансовая">Финансовая</option>
        <option value="техническая">Техническая</option>
        <option value="коллективная">Коллективная</option>
      </select>
    </div>
    <div>
      <label for="priority" class="block font-medium text-lg">Приоритет</label>
      <select id="priority" name="priority" required class="w-full p-3 mt-2 border rounded-md">
        <option value="высокий">Высокий</option>
        <option value="средний">Средний</option>
        <option value="низкий">Низкий</option>
      </select>
    </div>
    <button type="submit" class="w-full py-3 bg-blue-600 text-white rounded-md hover:bg-blue-700">Создать проблему</button>
  </form>
</main>
</body>
</html>
