<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Создание новой проблемы</title>
  <link href="assets/tailwind.min.css" rel="stylesheet">
  <link href="assets/styles.css" rel="stylesheet">
</head>
<body class="bg-gray-100 text-gray-900 font-sans">
<header class="bg-white shadow p-4 flex justify-between items-center">
  <h1 class="text-xl font-bold text-blue-600">СППР</h1>
  <nav class="space-x-4">
    <a href="index.html" class="text-blue-700 hover:underline">Главная</a>
    <a href="problems.html" class="text-blue-700 hover:underline">Проблемные ситуации</a>
    <a href="login.html" class="bg-blue-600 text-white px-3 py-1 rounded hover:bg-blue-700">Вход</a>
  </nav>
</header>

<main class="max-w-4xl mx-auto px-6 py-6">
  <h2 class="text-2xl font-bold mb-4">Создание новой проблемной ситуации</h2>
  <form action="insert_problem.php" method="POST" enctype="multipart/form-data" class="grid grid-cols-1 md:grid-cols-2 gap-4">

    <!-- Название -->
    <div>
      <label for="title" class="block font-medium text-lg">Название проблемы</label>
      <input type="text" id="title" name="title" placeholder="От 3 до 10 слов" required class="w-full p-2 border rounded-md">
    </div>

    <!-- Ключевые слова -->
    <div>
      <label for="keywords" class="block font-medium text-lg">Ключевые слова</label>
      <input type="text" id="keywords" name="keywords" placeholder="До 7 слов или словосочетаний через запятую" required class="w-full p-2 border rounded-md">
    </div>

    <!-- Описание -->
    <div class="md:col-span-2">
      <label for="description" class="block font-medium text-lg">Описание</label>
      <textarea id="description" name="description" rows="3" placeholder="Опишите кратко вашу проблемную ситуацию" required class="w-full p-2 border rounded-md"></textarea>
    </div>

    <!-- Категория -->
    <div>
      <label for="category" class="block font-medium text-lg">Категория</label>
      <select id="category" name="category" required class="w-full p-2 border rounded-md">
        <option value="финансовая">Финансовая</option>
        <option value="техническая">Техническая</option>
        <option value="коллективная">Коллективная</option>
      </select>
    </div>

    <!-- Приоритет -->
    <div>
      <label for="priority" class="block font-medium text-lg">Приоритет</label>
      <select id="priority" name="priority" required class="w-full p-2 border rounded-md">
        <option value="высокий">Высокий</option>
        <option value="средний">Средний</option>
        <option value="низкий">Низкий</option>
      </select>
    </div>

    <!-- Затрагиваемые отделы (checkbox + текстовое поле) -->
    <div class="md:col-span-2">
      <label class="block font-medium text-lg mb-1">Затрагиваемые отделы</label>
      <div class="grid grid-cols-2 gap-2 mb-2">
        <label class="flex items-center space-x-2">
          <input type="checkbox" name="departments[]" value="отдел закупок">
          <span>Отдел закупок</span>
        </label>
        <label class="flex items-center space-x-2">
          <input type="checkbox" name="departments[]" value="склад">
          <span>Склад</span>
        </label>
        <label class="flex items-center space-x-2">
          <input type="checkbox" name="departments[]" value="отдел продаж">
          <span>Отдел продаж</span>
        </label>
        <label class="flex items-center space-x-2">
          <input type="checkbox" name="departments[]" value="сервисная мастерская">
          <span>Сервисная мастерская</span>
        </label>
        <label class="flex items-center space-x-2">
          <input type="checkbox" name="departments[]" value="логистика">
          <span>Логистика</span>
        </label>
        <label class="flex items-center space-x-2">
          <input type="checkbox" name="departments[]" value="финансовый отдел">
          <span>Финансовый отдел</span>
        </label>
      </div>
      <input type="text" name="departments_custom" placeholder="Введите название отдела самостоятельно" class="w-full p-2 border rounded-md mb-1">
      <p class="text-gray-500 text-sm">Вы можете выбрать несколько отделов, которые затрагивает проблема, либо ввести название отдела самостоятельно.</p>
    </div>

    <!-- Дата возникновения -->
    <div>
      <label for="date" class="block font-medium text-lg">Дата возникновения</label>
      <input type="date" id="date" name="date" class="w-full p-2 border rounded-md">
    </div>

    <!-- Влияние на клиентов -->
    <div>
      <label for="impact" class="block font-medium text-lg">Влияние на клиентов</label>
      <select id="impact" name="impact" class="w-full p-2 border rounded-md">
        <option value="значительное">Значительное</option>
        <option value="умеренное">Умеренное</option>
        <option value="незначительное">Незначительное</option>
      </select>
    </div>

    <!-- Время решения -->
    <div>
      <label for="timeframe" class="block font-medium text-lg">Время решения</label>
      <select id="timeframe" name="timeframe" class="w-full p-2 border rounded-md">
        <option value="1 час">1 час</option>
        <option value="2 часа">2 часа</option>
        <option value="3 часа">3 часа</option>
        <option value="1 день">1 день</option>
        <option value="3 дня">3 дня</option>
        <option value="1 неделя">1 неделя</option>
        <option value="2 недели">2 недели</option>
      </select>
    </div>

    <!-- Файл -->
    <div class="md:col-span-2">
      <label for="file" class="block font-medium text-lg">Прикрепить файл (по необходимости)</label>
      <input type="file" id="file" name="file" class="w-full p-2 border rounded-md">
    </div>

    <!-- Кнопка отправки -->
    <div class="md:col-span-2">
      <button type="submit" class="w-full py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700">Создать проблему</button>
    </div>

  </form>
</main>
</body>
</html>
