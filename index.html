<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Главная</title>
  <link href="assets/tailwind.min.css" rel="stylesheet" />
  <link href="assets/styles.css" rel="stylesheet" />
</head>
<body class="relative min-h-screen overflow-hidden font-sans">

  <!-- Градиентные пульсирующие шары -->
  <div class="absolute top-0 left-0 w-full h-full overflow-hidden">
    <!-- Большой шар -->
    <div class="absolute w-[150%] h-[150%] -translate-x-1/4 -translate-y-1/4 rounded-full opacity-70"
         style="background: radial-gradient(circle, #2563EB, #ffffff); animation: pulseSlow 8s ease-in-out infinite;"></div>
    <!-- Средний шар -->
    <div class="absolute w-[100%] h-[100%] top-1/4 left-1/4 rounded-full opacity-50"
         style="background: radial-gradient(circle, #60A5FA, #ffffff); animation: pulseSlow 8s ease-in-out infinite 2s;"></div>
    <!-- Малый шар -->
    <div class="absolute w-[50%] h-[50%] bottom-0 right-0 rounded-full opacity-40"
         style="background: radial-gradient(circle, #93C5FD, #ffffff); animation: pulseSlow 8s ease-in-out infinite 4s;"></div>
  </div>

  <!-- Контент поверх фона -->
  <header class="relative z-10 p-4 flex justify-between items-center bg-white shadow">
    <h1 class="text-xl font-bold text-blue-600">СППР</h1>
    <nav class="space-x-4">
      <a href="index.html" class="text-blue-700 hover:underline">Главная</a>
      <a href="problems.html" class="text-blue-700 hover:underline">Проблемные ситуации</a>
      <a href="materials.html" class="text-blue-700 hover:underline">Материалы</a>
      <a href="login.html" class="bg-blue-600 text-white px-3 py-1 rounded hover:bg-blue-700">Вход</a>
    </nav>
  </header>

  <main class="relative z-10 max-w-6xl mx-auto px-8 py-10 text-center">
    <h2 class="text-4xl font-bold mb-6 text-blue-800">Добро пожаловать в СППР</h2>
    <p class="text-lg text-gray-700">Система поддержки принятия решений для работы с проблемными ситуациями.</p>
  </main>

</body>

<style>
/* Плавная анимация пульсации шаров */
@keyframes pulseSlow {
  0%, 100% { transform: scale(1); opacity: 0.7; }
  50% { transform: scale(1.1); opacity: 0.85; }
}
</style>
