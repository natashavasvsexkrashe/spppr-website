<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Проблема: Недостаток запасных частей</title>

  <!-- Tailwind -->
  <link href="assets/tailwind.min.css" rel="stylesheet" />

  <!-- CSS (ВАЖНО: из assets) -->
  <link href="assets/styles.css" rel="stylesheet" />
</head>

<body class="bg-gray-100 text-gray-900 font-sans">

<header class="bg-white shadow p-4 flex justify-between items-center">
  <h1 class="text-xl font-bold text-blue-600">СППР</h1>
</header>

<main class="max-w-5xl mx-auto p-6">

  <h2 class="text-2xl font-bold mb-4">
    Недостаток запасных частей для ТО
  </h2>

  <p class="mb-6 text-gray-600">
    На складе недостаточно тормозных колодок и фильтров.
  </p>

  <!-- КОММЕНТАРИИ -->
  <section>
    <h3 class="text-xl font-semibold mb-3">Комментарии</h3>

    <form id="commentForm" class="space-y-3 mb-6">
      <input id="usernameInput" type="text" placeholder="Имя"
        class="w-full p-2 border rounded" required>

      <textarea id="commentInput" placeholder="Комментарий"
        class="w-full p-2 border rounded" required></textarea>

      <button class="bg-blue-600 text-white px-4 py-2 rounded">
        Добавить
      </button>
    </form>

    <div id="commentList" class="space-y-4"></div>
  </section>

</main>

<script>
let comments = [
  {name:"Иван", text:"Нужно срочно заказать детали", likes:2, dislikes:0},
  {name:"Анна", text:"Можно взять с другого склада", likes:1, dislikes:0}
];

function renderComments() {
  const list = document.getElementById('commentList');
  list.innerHTML = '';

  comments.forEach(c => {
    const div = document.createElement('div');
    div.className = "bg-white p-4 rounded shadow";

    div.innerHTML = `
      <b>${c.name}</b>
      <p>${c.text}</p>
      <div class="text-sm text-gray-500 mt-2">
        👍 ${c.likes} | 👎 ${c.dislikes}
      </div>
    `;

    list.appendChild(div);
  });
}

document.getElementById('commentForm').addEventListener('submit', function(e){
  e.preventDefault();

  const name = usernameInput.value.trim();
  const text = commentInput.value.trim();

  if(name && text){
    comments.push({name, text, likes:0, dislikes:0});
    renderComments();
    commentForm.reset();
  }
});

renderComments();
</script>

</body>
</html>
